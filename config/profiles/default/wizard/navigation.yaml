        Расширительный бак 80 л.
      enabled: false
      next: selection-form

    - id: bps-w-j
      title: BPS–WJ
      image: /selection-assets/pu-cards/bps-w-j.png
      description: |
        Автоматический и ручной режимы работы
        Шкаф управления со встроенной диспетчеризацией, сенсорным контроллером
        Защита от «сухого хода» по реле протока
      enabled: false
      next: selection-form

  simpel-line:
    - id: comos
      title: COMOS
      image: /selection-assets/simpel-cards/comos.png
      description: |
        Консольно-моноблочный насос
        Для систем отопления, вентиляции, холодоснабжения, пожаротушения, технологии
        Корпус двигателя, проточная часть, рабочее колесо – чугун НТ200 / нерж. сталь AISI 304; вал – нерж. сталь AISI 304
        Оптимальное решение для перекачивания гликолевых растворов
      enabled: false

    - id: civos
      title: CIVOS
      image: /selection-assets/simpel-cards/civos.png
      description: |
        Вертикальный одноступенчатый насос типа «in-line»
        Для систем отопления, вентиляции, холодоснабжения, ГВС, пожаротушения, технологии
        Корпус двигателя, проточная часть, рабочее колесо – чугун НТ200; вал – нерж. сталь AISI 304
        Оптимальное решение для перекачивания гликолевых растворов
      enabled: false

    - id: vmip
      title: VMIP
      image: /selection-assets/simpel-cards/vmip.png
      description: |
        Вертикальный многоступенчатый центробежный насос
        Для систем водоснабжения, ГВС, пожаротушения, технологии
        Корпус двигателя, основание насоса – чугун; рабочие камеры, рабочие колеса, вал – нерж. сталь AISI 304
        Класс эффективности двигателя: IE3
      enabled: false

    - id: hmip
      title: HMIP
      image: /selection-assets/simpel-cards/hmip.png
      description: |
        Горизонтальный многоступенчатый центробежный насос
        Для систем водоснабжения, ГВС, пожаротушения, технологии
        Корпус двигателя, основание насоса – чугун; проточная, рабочие колеса, вал – нерж. сталь AISI 304
        Класс эффективности двигателя: IE2 / IE3
      enabled: false

  installation-type:
    - id: domestic
      title: Хозяйственно-питьевая
      description: Водоснабжение, повышение давления в тупиковой сети.
      flow: bps-w-domestic
      next: selection-form

    - id: fire-pns
      title: "Пожарная насосная станция (ПНС)"
      description: "Пожаротушение: ВПВ, дренчерная, спринклерная."
      flow: bps-w-fire
      enabled: false
      next: selection-form
