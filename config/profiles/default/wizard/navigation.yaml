# Дерево навигации визарда (типы шагов → компоненты движка)

# Тексты карточек — как на 159.194.215.53



steps:

  - id: product-class

    type: card-grid

    titleKey: appTitle

    subtitleKey: homeSubtitle

  - id: product-line

    type: card-grid

    title: "Линейка насосных установок"

    subtitle: "Далее уточните тип сети — хоз-пит или ПНС"

    parent: product-class

    when:

      productClass: pump-stations

  - id: installation-type

    type: card-grid

    title: "Тип установки"

    subtitle: "Выберите назначение установки"

    parent: product-line

  - id: selection-form

    type: selection-form

    title: "Подбор насосной установки"

    parent: installation-type

    flowRef: flows/bps-w-domestic.yaml



cards:

  product-class:

    - id: hydromodules

      title: Гидромодули

      image: /selection-assets/podbor-001.png

      description: |

        Для закрытых систем вентиляции и кондиционирования.

        Циркуляция теплоносителя между чиллером и местными теплообменниками в схемах «чиллер — фанкойл».

      enabled: true

      next: product-line

    - id: pump-stations

      title: Насосные установки

      image: /selection-assets/podbor-002.png

      description: |

        Перекачка и повышение давления воды в системах хозяйственно-питьевого водоснабжения и пожаротушения жилых, административных и производственных зданий.

      enabled: true

      next: product-line

    - id: aupd

      title: АУПД и АУПДЗ

      image: /selection-assets/podbor-003.png

      description: |

        В разработке

      enabled: false

    - id: simpel

      title: Насосы Simpel

      image: /selection-assets/podbor-004.png

      description: |

        Подбор серийных насосов COMOS, CIVOS, VMIP, HMIP по параметрам.

      enabled: true



  product-line:

    - id: bps-w

      title: BPS-W

      description: "—"

      enabled: true

      next: installation-type



  installation-type:

    - id: domestic

      title: Хозяйственно-питьевая

      description: Водоснабжение, повышение давления в тупиковой сети.

      flow: bps-w-domestic

      next: selection-form

    - id: fire-pns

      title: "Пожарная насосная станция (ПНС)"

      description: "Пожаротушение: ВПВ, дренчерная, спринклерная."

      flow: bps-w-fire

      enabled: false

      next: selection-form

