services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pump
      POSTGRES_PASSWORD: pump
      POSTGRES_DB: pumpstation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      APP_PROFILE_ID: default
      USE_MOCK_DB: "false"
      DATABASE_URL: postgresql+asyncpg://pump:pump@postgres:5432/pumpstation
      JWT_SECRET: docker-dev-secret
    depends_on:
      - postgres
    volumes:
      - ./config:/app/config:ro

  web:
    build: ./apps/web
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

volumes:
  pgdata:
